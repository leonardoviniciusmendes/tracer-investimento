name: radarbolsa

services:
  mysql:
    image: mysql:8.4
    container_name: radarbolsa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${RADARBOLSA_DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${RADARBOLSA_DB_NAME:-radarbolsa}
      MYSQL_USER: ${RADARBOLSA_DB_USER:-radarbolsa}
      MYSQL_PASSWORD: ${RADARBOLSA_DB_PASSWORD:-radarbolsa}
    ports:
      - "${RADARBOLSA_DB_PORT:-3307}:3306"
    volumes:
      - radarbolsa_mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - radarbolsa_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: src/backend/RadarBolsa.Api/Dockerfile
    container_name: radarbolsa-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${RADARBOLSA_API_ENVIRONMENT:-Development}
      ConnectionStrings__RadarBolsa: Server=mysql;Port=3306;Database=${RADARBOLSA_DB_NAME:-radarbolsa};User=${RADARBOLSA_DB_USER:-radarbolsa};Password=${RADARBOLSA_DB_PASSWORD:-radarbolsa};
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${RADARBOLSA_API_PORT:-8081}:8080"
    networks:
      - radarbolsa_network

volumes:
  radarbolsa_mysql_data:

networks:
  radarbolsa_network:
    name: radarbolsa-network
